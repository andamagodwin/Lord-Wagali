services:
  - type: web
    name: lord-wagali-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run prisma:deploy && npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
